# Prometheus 配置文件

global:
  scrape_interval: 15s # 抓取间隔
  evaluation_interval: 15s # 评估间隔
  external_labels:
    monitor: 'mall-eco-monitor'

# 告警配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# 告警规则
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# 抓取配置
scrape_configs:
  # 监控 Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 监控 Node Exporter（如果部署了）
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

  # 监控 MySQL
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql:9104'] # 需要部署 mysql_exporter

  # 监控 Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121'] # 需要部署 redis_exporter

  # 监控 RabbitMQ
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692'] # RabbitMQ 自带的监控端点

  # 监控 Consul
  - job_name: 'consul'
    static_configs:
      - targets: ['consul:8500']

  # 监控 Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113'] # 需要部署 nginx_exporter

  # 监控 应用服务实例 1
  - job_name: 'mall-eco-api-1'
    metrics_path: '/api/metrics' # 应用暴露的监控端点
    static_configs:
      - targets: ['mall-eco-api-1:9000']

  # 监控 应用服务实例 2
  - job_name: 'mall-eco-api-2'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['mall-eco-api-2:9000']

  # 监控 应用服务实例 3
  - job_name: 'mall-eco-api-3'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['mall-eco-api-3:9000']

  # 监控 Docker
  - job_name: 'docker'
    static_configs:
      - targets: ['dockerhost:9323'] # 需要部署 docker_exporter

  # 监控系统负载
  - job_name: 'system'
    static_configs:
      - targets: ['localhost:9100'] # 需要部署 node_exporter
