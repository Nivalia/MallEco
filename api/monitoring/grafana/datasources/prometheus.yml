# Grafana 数据源配置
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    version: 1
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "GET"
    secureJsonData:
      # 如果 Prometheus 有认证，可以在这里配置
      # basicAuthPassword: "password"
    basicAuth: false
    # basicAuthUser: "admin"

  # 可以添加其他数据源，如 Loki 用于日志监控
  # - name: Loki
  #   type: loki
  #   access: proxy
  #   url: http://loki:3100
  #   isDefault: false
  #   version: 1
  #   editable: true
